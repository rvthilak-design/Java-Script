<!DOCTYPE html>
<html>

<head>
    <title>Multiplication using Function</title>
</head>

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<body>
     
    <h1>JavaScript Multiplying using Functions</h1>

<br><br><br><br><br><br>

    <p>Multiplying </p>
    <button type="button" class="btn btn-primary" onclick="myFunction()">Click Me!</button>
    <p id="demo"></p>
    <p id="demo1"></p>

<script>
    var b = 5;
    function myFunction() {
        var a = 10;
        document.getElementById("demo").innerHTML = b * a;
    }
    document.getElementById("demo1").innerHTML = a;
    document.getElementById("demo2").innerHTML = b;
</script>


<br><br><br><br><br><br>

    <button type="button" class="btn btn-dark" onclick="myFunction1()">Click Me!</button>
    <p id="demo3"></p>
    <p id="demo4"></p>

    <script>
        var b = 5;
        function myFunction1() {
            var a = 4;
            document.getElementById("demo3").innerHTML = b * a;
        }
        document.getElementById("demo3").innerHTML = a;
        document.getElementById("demo4").innerHTML = b;
    </script>

<br><br><br><br><br><br>

<button type="button" class="btn btn-dark" onclick="myFunction2()">Click Me!</button>
<p id="demo5"></p>
<p id="demo6"></p>

<script>
    var b = 9;
    function myFunction2() {
        var a = 4;
        document.getElementById("demo5").innerHTML = b * a;
    }
    document.getElementById("demo5").innerHTML = a;
    document.getElementById("demo6").innerHTML = b;
</script>
</body>
</html>
